hint = """Variables in rust must be declared as mutable if their value is to be changed"""


[[exercises]]
name = "intro03"
dir = "01-Introduction"
hint = """
Functions must declare their argument type and return type correctly
Common types are: bool, char, i32
"""

[[exercises]]
name = "intro04"
dir = "01-Introduction"
hint = """
There are various syntax mistakes in this file, remember loops can be formatted as `for i in 1..5 { ...`
Remember that `variable += 5;` will add 5 to the variable
"""


[[exercises]]
name = "vecs01"
dir = "02-vecs"
hint = """
In Rust, there are two ways to define a Vector.
1. One way is to use the `Vec::new()` function to create a new vector
   and fill it with the `push()` method.
2. The second way is to use the `vec![]` macro and define your elements
   inside the square brackets. This way is simpler when you exactly know
   the initial values.

Check this chapter: https://doc.rust-lang.org/book/ch08-01-vectors.html
of the Rust book to learn more."""

[[exercises]]
name = "vecs02"
dir = "02-vecs"
hint = """
Use the `.push()` method on the vector to push new elements to it."""


[[exercises]]
name = "strings01"
dir = "03-strings"
test = false
hint = """
The `current_favorite_color` function is currently returning a string slice
with the `'static` lifetime. We know this because the data of the string lives
in our code itself -- it doesn't come from a file or user input or another
program -- so it will live as long as our program lives.

But it is still a string slice. There's one way to create a `String` by
converting a string slice covered in the Strings chapter of the book, and
another way that uses the `From` trait."""

[[exercises]]
name = "strings02"
dir = "03-strings"
test = false
hint = """
Yes, it would be really easy to fix this by just changing the value bound to
`word` to be a string slice instead of a `String`, wouldn't it? There is a way
to add one character to the `if` statement, though, that will coerce the
`String` into a string slice.

Side note: If you're interested in learning about how this kind of reference
conversion works, you can jump ahead in the book and read this part in the
smart pointers chapter:
https://doc.rust-lang.org/book/ch15-02-deref.html#implicit-deref-coercions-with-functions-and-methods"""

[[exercises]]
name = "strings03"
dir = "03-strings"
hint = """
There are many useful standard library functions for strings. Let's try and use
some of them:
https://doc.rust-lang.org/std/string/struct.String.html#method.trim

For the `compose_me` method: You can either use the `format!` macro, or convert
the string slice into an owned string, which you can then freely extend.

For the `replace_me` method, you can check out the `replace` method:
https://doc.rust-lang.org/std/string/struct.String.html#method.replace"""


[[exercises]]
name = "ownership01"
dir = "04-Ownership"
test = false
hint = """
In Rust, passing a value to a function moves it -- the caller no longer owns it.
If you need to use the value after the call, you need to create a copy of it
before passing it to the function.
Remember: don't change the `greet` function signature -- only fix the call site."""

[[exercises]]
name = "ownership02"
dir = "04-Ownership"
test = false
hint = """
To call methods that modify a value (like `push_str`), the variable must be declared as mutable.
How do you declare a variable as mutable in Rust?"""

[[exercises]]
name = "ownership03"
dir = "04-Ownership"
test = false
hint = """
Rust does not allow a mutable borrow while an immutable borrow is still live.
A borrow stays live until the last point where it is used.
Think about where `r` is used and whether you can rearrange things so the
immutable borrow is no longer active when the mutable borrow is created."""

[[exercises]]
name = "ownership04"
dir = "04-Ownership"
test = false
hint = """
Rust allows at most ONE mutable borrow of a value at a time.
Having both `a` and `b` as `&mut v` simultaneously is not allowed.
You don't need two separate mutable references here -- just use `v` directly,
or use only one mutable reference at a time."""

[[exercises]]
name = "ownership05"
dir = "04-Ownership"
test = false
hint = """
`greeting` is a local variable inside `make_greeting`.
When the function returns, `greeting` is dropped -- a reference to it would be dangling.
Instead of returning a reference, think about how you can transfer ownership of
the value to the caller."""

[[exercises]]
name = "refs01"
dir = "04-References"
test = false
hint = """
`print_length` expects a borrowed value, not an owned one.
Passing `name` directly would move it into the function.
How do you pass a value by reference instead of by value in Rust?"""

[[exercises]]
name = "refs02"
dir = "04-References"
test = false
hint = """
`add_item` needs a mutable reference so it can modify the vector.
Rust requires you to be explicit when handing out mutable access to a value.
Look at the function signature -- what kind of reference does it expect?
Make sure the call site matches."""

[[exercises]]
name = "refs03"
dir = "04-References"
test = false
hint = """
`sum` expects a borrowed slice, not an owned `Vec`.
Passing `scores` directly moves the whole vector into the function.
How can you pass a reference to `scores` instead?
Bonus: doing so means `scores` is still usable after the call."""

[[exercises]]
name = "refs04"
dir = "04-References"
test = false
hint = """
`first` borrows a slice of `text`. While that borrow is live, `text` can't be mutated.
A borrow stays live until the last point where it is used.
Can you rearrange the code so that `first` is no longer needed by the time
`text` is modified?"""

[[exercises]]
name = "refs05"
dir = "04-References"
test = false
hint = """
When a function returns a reference that could come from one of multiple inputs,
Rust needs a lifetime annotation to know how long the return value lives.
You need to tell Rust that the returned reference lives at least as long as
both inputs. Look into lifetime parameters for functions."""


[[exercises]]
name = "options01"
dir = "05-Options"
hint = """
Use `return Some(5);` to return an integer wrapped in an option value
use `return None;` to return None

Remember that u16 is an unsigned integer, so negatives are impossible
"""

[[exercises]]
name = "options02"
dir = "05-Options"
hint = """
Use this to obtain the value wrapped in the option

if let Some(variable_name) = optionalVariable {
    // Remember the variable will only be in scope inside this if statement
    // So you need an external variable
}


"""

[[exercises]]
name = "options03"
dir = "05-Options"
hint = """
Use this to obtain the value wrapped in the option

if let Some(variable_name) = optionalVariable {
    // Remember the variable will only be in scope inside this if statement
    // So you need an external variable
}


But remember, you can return from a function at any time, even in an if let statement

"""


[[exercises]]
name = "results01"
dir = "06-Results"
hint = """
Use `Ok(value)` to wrap a successful result and `Err(message)` to wrap an error.
You'll need to check if the hour is valid (not higher than 23) and return an error for invalid hours.
Before 22:00, return Ok(5), and at 22:00 or later, return Ok(0).
"""

[[exercises]]
name = "results02"
dir = "06-Results"
hint = """
Change the return type from `Option<String>` to `Result<String, String>`.
Instead of returning `None` for the error case, return `Err(String::from("Empty names aren't allowed"))`.
You'll also need to adjust the test file expectations from `as_deref()` to work with Result.
"""

[[exercises]]
name = "results03"
dir = "06-Results"
hint = """
Use the `?` operator to propagate errors. When `parse::<i32>()` returns an error,
the `?` operator will immediately return that error from the function.
Don't forget that `qty` will be a `Result` type after parsing, so you need to use `?` to extract the value.
"""

